name: Deploy — Vercel Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to Vercel
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_HORIZON_URL: https://horizon-testnet.stellar.org
          VITE_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          VITE_NETWORK: TESTNET
          VITE_STLR_ISSUER: ${{ secrets.VITE_STLR_ISSUER }}
          VITE_STLR_ISSUER_SECRET: ${{ secrets.VITE_STLR_ISSUER_SECRET }}
          VITE_STAKING_ACCOUNT: ${{ secrets.VITE_STAKING_ACCOUNT }}
          VITE_STAKING_SECRET: ${{ secrets.VITE_STAKING_SECRET }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: team_ojo7mfRoSUbMnIHJvDtNbhBj
          VERCEL_PROJECT_ID: prj_meyuvJlf5ShYpkSs1NhNBO7pgKpj
